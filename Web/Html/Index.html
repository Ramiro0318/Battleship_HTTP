<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <div id="ingreso">
            <form>

                <label for="nombreUsuario">Ingresa tu nombre</label>
                <input id="nombreUsuario" type="text" />

                <button type="submit">Siguiente</button>
            </form>
        </div>

        <div id="seleccion">
            <button>Emparejamiento libre.</button>
            <button>Crear sala</button>
            <button>Unirse a sala</button>
        </div>

        <div id="sala">
            <form>
                <input type="number" placeholder="Ingresa el número de sala" />
                <dl title="Jugadores">
                    <dt>Jugador 1</dt>
                    <dd>Ramiro</dd>
                    <dt>Jugador 2</dt>
                    <dd>Zapato</dd>
                </dl>
                <small> 1 de 2 jugadores listos...</small>

                <button>Iniciar</button>
            </form>
        </div>

        <div id="espera">
            <span>No. de sala <b>#123</b></span>

            <dl title="Jugadores">
                <dt>Jugador 1</dt>
                <dd>Ramiro</dd>
                <dt>Jugador 2</dt>
                <dd>Zapato</dd>
            </dl>

            <small> 1 de 2 jugadores listos...</small>
            <button>Iniciar</button>


        </div>
    </main>
</body>
</html>
