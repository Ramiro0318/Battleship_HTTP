<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleship</title>
    <link rel="stylesheet" href="/battleship/css/Style.css">
    <script src="/battleship/js/Index.js"></script>
</head>
<body>
    <header>
        <h1>Battleship online</h1>
    </header>
    <main>

        <button id="cerrarSesion" class="invisible">Cerrar sesión</button>

         <div id="ingreso" class="menu">
             <form>
                 <label for="nombreUsuario">Ingresa tu nombre</label>
                 <input id="nombreUsuario" type="text" required />

                 <span id="errorIngreso"></span>

                 <button id="ingresarNombre" >Siguiente</button>
             </form>
        </div> 

         <div id="seleccion" class="menu invisible">
             <button id="matchmaking">Emparejamiento libre</button>
             <button id="crearSala">Crear sala</button>
             <button id="unirseSala">Unirse a sala</button>
         </div> 

         <div id="sala" class="menu invisible">
            <form>
                <input id="numeroSala" type="text" placeholder="Ingresa el número de sala" required />

                <span id="errorNumSala"></span>

                <button id="buscar">Buscar</button>
                <button type="button" class="cancelar">Cancelar</button>
            </form>
        </div> 

        <div id="espera" class="menu invisible">
            <span>No. de sala <b>#123</b></span>

            <dl title="Jugadores">
                <dt>Jugador 1</dt>
                <dd>Ramiro</dd>
                <dt>Jugador 2</dt>
                <dd>Zapato</dd>
            </dl>

            <small> 1 de 2 jugadores listos...</small>
            <button class="listo">Listo</button>
            <button type="button" class="cancelar">Regresar</button>
        </div>

       
    </main>
</body>
</html>
